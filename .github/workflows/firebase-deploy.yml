name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - claude/ai-photo-editor-git-l1e59b

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SA_JSON" > /tmp/sa.json
          DEPLOY_OUT=$(GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase-tools deploy \
            --only hosting \
            --project chatbot-kbnn \
            --non-interactive 2>&1) && EXIT_CODE=0 || EXIT_CODE=$?
          rm -f /tmp/sa.json
          echo "$DEPLOY_OUT"
          # Treat "current active version" as success — content already live
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$DEPLOY_OUT" | grep -q "current active version"; then
              echo "✔ Version already deployed and live — no changes needed."
            else
              echo "Deploy failed with unexpected error."
              exit 1
            fi
          fi
